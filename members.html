<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Jana – Mitglieder</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="topbar">
      <div class="topbar-title">Mitglieder</div>
      <div class="topbar-actions">
        <input type="text" id="search" class="form-input hide-mobile" placeholder="Name suchen…" style="width:180px;font-size:13px;padding:6px 10px">
      </div>
    </div>

    <div class="tab-bar" style="background:var(--bg-card);padding:0 4px">
      <div class="tab active" data-tab="alle">Alle <span id="count-alle"></span></div>
      <div class="tab" data-tab="offen">Offen <span id="count-offen"></span></div>
      <div class="tab" data-tab="ueberfaellig">Überfällig <span id="count-ueberfaellig"></span></div>
    </div>

    <!-- Mobile Suche -->
    <div style="padding:10px 14px;background:var(--bg-card);border-bottom:0.5px solid var(--border)" class="mobile-search">
      <input type="text" id="search-mobile" class="form-input" placeholder="Name suchen…">
    </div>

    <div class="content">
      <div class="card">
        <div id="members-table"><div class="empty-state">Wird geladen…</div></div>
      </div>
    </div>
  </div>
</div>

<!-- Modal: Zahlung eintragen -->
<div class="modal-overlay hidden" id="modal-pay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title" id="pay-title">Zahlung eintragen</div>
      <button class="modal-close" id="pay-close">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Monat</label>
        <select id="pay-month" class="form-select"></select>
      </div>
      <div class="form-group">
        <label class="form-label">Betrag (€)</label>
        <input type="number" id="pay-amount" class="form-input" inputmode="decimal" step="0.01">
      </div>
      <div class="form-group">
        <label class="form-label">Notiz</label>
        <input type="text" id="pay-note" class="form-input" placeholder="z. B. bar übergeben">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" id="pay-cancel">Abbrechen</button>
      <button class="btn btn-primary" id="pay-save">Speichern</button>
    </div>
  </div>
</div>

<style>
  @media (min-width: 701px) { .mobile-search { display: none; } }
</style>

<script type="module">
  import { requireAuth, isAdmin } from '/js/auth-guard.js';
  import { supabase, getCommunityId, writeAuditLog } from '/js/client.js';
  import { renderLayout, showToast, openModal, closeModal, formatDate, initials, monthLabel, formatEur } from '/js/ui.js';

  const membership = await requireAuth();
  if (!membership) throw new Error('not logged in');
  renderLayout('members');

  const communityId = getCommunityId();
  const now = new Date();
  const month = now.getMonth() + 1;
  const year  = now.getFullYear();

  let allMembers = [], paidIds = new Set(), prevPaidIds = new Set();
  let activeTab = 'alle', searchTerm = '';
  let activeMemberId = null, communityFee = 5;
  let activeMonth = month, activeYear = year;

  // Monats-Dropdown befüllen
  const payMonth = document.getElementById('pay-month');
  for (let i = 0; i < 6; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const opt = document.createElement('option');
    opt.value = `${d.getFullYear()}-${d.getMonth() + 1}`;
    opt.textContent = monthLabel(d.getMonth() + 1, d.getFullYear());
    if (i === 0) opt.selected = true;
    payMonth.appendChild(opt);
  }

  async function load() {
    const { data: comm } = await supabase.from('communities').select('monthly_fee').eq('id', communityId).single();
    communityFee = comm?.monthly_fee ?? 5;

    const { data } = await supabase
      .from('memberships')
      .select('id, joined_at, role, status, profiles(id, full_name, phone)')
      .eq('community_id', communityId)
      .order('joined_at');
    allMembers = data || [];

    const ids = allMembers.map(m => m.id);

    // Zahlungen diesen Monat
    const { data: p1 } = await supabase.from('payments').select('membership_id').in('membership_id', ids).eq('period_month', month).eq('period_year', year);
    paidIds = new Set(p1?.map(p => p.membership_id));

    // Vormonat für "überfällig"
    const pm = month === 1 ? 12 : month - 1;
    const py = month === 1 ? year - 1 : year;
    const { data: p2 } = await supabase.from('payments').select('membership_id').in('membership_id', ids).eq('period_month', pm).eq('period_year', py);
    prevPaidIds = new Set(p2?.map(p => p.membership_id));

    allMembers = allMembers.map(m => ({ ...m, paidThis: paidIds.has(m.id), paidPrev: prevPaidIds.has(m.id) }));
    updateCounts();
    renderTable();
  }

  function updateCounts() {
    const active = allMembers.filter(m => m.status === 'aktiv');
    document.getElementById('count-alle').textContent        = `(${active.length})`;
    document.getElementById('count-offen').textContent       = `(${active.filter(m => !m.paidThis).length})`;
    document.getElementById('count-ueberfaellig').textContent = `(${active.filter(m => !m.paidThis && !m.paidPrev).length})`;
  }

  function getFiltered() {
    let list = allMembers.filter(m => m.status === 'aktiv');
    if (activeTab === 'offen')        list = list.filter(m => !m.paidThis);
    if (activeTab === 'ueberfaellig') list = list.filter(m => !m.paidThis && !m.paidPrev);
    if (searchTerm) {
      const q = searchTerm.toLowerCase();
      list = list.filter(m => m.profiles?.full_name?.toLowerCase().includes(q));
    }
    return list;
  }

  function renderTable() {
    const list = getFiltered();
    if (!list.length) {
      document.getElementById('members-table').innerHTML = '<div class="empty-state">Keine Mitglieder gefunden</div>';
      return;
    }
    document.getElementById('members-table').innerHTML = list.map(m => {
      const name = m.profiles?.full_name || '—';
      const pill = m.paidThis
        ? '<span class="pill pill-green">Bezahlt</span>'
        : m.paidPrev
          ? '<span class="pill pill-amber">Offen</span>'
          : '<span class="pill pill-red">Überfällig</span>';

      const actionBtn = isAdmin() && !m.paidThis
        ? `<button class="btn btn-sm btn-primary" onclick="openPay('${m.id}','${name}')">Eintragen</button>`
        : '';

      return `<div class="row" style="grid-template-columns:30px 1fr auto${isAdmin() && !m.paidThis ? ' 80px' : ''}">
        <div class="avatar ${m.paidThis ? 'av-green' : 'av-gray'}">${initials(name)}</div>
        <div>
          <div class="name-line">${name}</div>
          <div class="sub-line">${m.profiles?.phone || `seit ${formatDate(m.joined_at)}`}</div>
        </div>
        ${pill}
        ${actionBtn}
      </div>`;
    }).join('');
  }

  // Zahlung eintragen
  window.openPay = (id, name) => {
    activeMemberId = id;
    document.getElementById('pay-title').textContent = `Zahlung — ${name}`;
    document.getElementById('pay-amount').value = communityFee;
    document.getElementById('pay-note').value   = '';
    payMonth.selectedIndex = 0;
    openModal('modal-pay');
  };

  document.getElementById('pay-close').addEventListener('click',  () => closeModal('modal-pay'));
  document.getElementById('pay-cancel').addEventListener('click', () => closeModal('modal-pay'));

  document.getElementById('pay-save').addEventListener('click', async () => {
    const amount = parseFloat(document.getElementById('pay-amount').value);
    const note   = document.getElementById('pay-note').value.trim();
    const [y, m] = document.getElementById('pay-month').value.split('-');
    if (!amount) return showToast('Betrag eingeben', 'error');

    const btn = document.getElementById('pay-save');
    btn.disabled = true;

    const user = (await supabase.auth.getUser()).data.user;
    const selMonth = parseInt(m), selYear = parseInt(y);

    const { error } = await supabase.from('payments').insert({
      membership_id: activeMemberId,
      amount, note,
      period_month: selMonth,
      period_year:  selYear,
      paid_at:      new Date().toISOString(),
      recorded_by:  user?.id,
    });

    if (error?.code === '23505') {
      showToast('Zahlung für diesen Monat bereits eingetragen', 'error');
      btn.disabled = false;
      return;
    }
    if (error) { showToast('Fehler', 'error'); btn.disabled = false; return; }

    await supabase.from('transactions').insert({
      community_id: communityId,
      amount,
      direction:    'eingang',
      description:  `Beitrag ${monthLabel(selMonth, selYear)} — ${document.getElementById('pay-title').textContent.replace('Zahlung — ','')}`,
      recorded_by:  user?.id,
    });

    await writeAuditLog(
      `Beitrag eingetragen: ${document.getElementById('pay-title').textContent.replace('Zahlung — ','')} ${monthLabel(selMonth, selYear)}`,
      'payment', activeMemberId
    );

    showToast('Zahlung gespeichert');
    closeModal('modal-pay');
    btn.disabled = false;
    await load();
  });

  // Tabs
  document.querySelectorAll('.tab').forEach(tab => tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    activeTab = tab.dataset.tab;
    renderTable();
  }));

  // Suche Desktop + Mobile
  document.getElementById('search').addEventListener('input', e => { searchTerm = e.target.value; renderTable(); });
  document.getElementById('search-mobile').addEventListener('input', e => { searchTerm = e.target.value; renderTable(); });

  await load();
</script>
</body>
</html>
