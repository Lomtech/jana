<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Jana – Mitglieder</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="topbar">
      <div class="topbar-title">Mitglieder</div>
      <div class="topbar-actions">
        <button class="btn btn-primary" id="add-btn">+ Mitglied</button>
      </div>
    </div>

    <!-- Suche + Tabs -->
    <div style="background:var(--bg-card);border-bottom:0.5px solid var(--border);padding:10px 16px">
      <input type="text" id="search" class="form-input" placeholder="Name suchen…" style="font-size:14px">
    </div>
    <div class="tab-bar" style="background:var(--bg-card)">
      <div class="tab active" data-tab="alle">Alle <span id="count-alle"></span></div>
      <div class="tab" data-tab="offen">Offen <span id="count-offen"></span></div>
      <div class="tab" data-tab="ueberfaellig">Überfällig <span id="count-ueberfaellig"></span></div>
    </div>

    <div class="content">
      <div class="card">
        <div id="members-table"><div class="empty-state">Wird geladen…</div></div>
      </div>
    </div>
  </div>
</div>

<!-- Modal: Mitglied -->
<div class="modal-overlay hidden" id="modal-add">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title">Neues Mitglied</div>
      <button class="modal-close" id="modal-close">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Vollständiger Name *</label>
        <input type="text" id="f-name" class="form-input" placeholder="Ahmad Khalid" autocomplete="name">
      </div>
      <div class="form-group">
        <label class="form-label">E-Mail *</label>
        <input type="email" id="f-email" class="form-input" placeholder="name@beispiel.de" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Telefon</label>
        <input type="tel" id="f-phone" class="form-input" placeholder="+49 170 000 0000" autocomplete="tel">
      </div>
      <div class="form-group">
        <label class="form-label">Beitrittsdatum</label>
        <input type="date" id="f-joined" class="form-input">
      </div>
      <div class="form-group">
        <label class="form-label">Adresse</label>
        <input type="text" id="f-address" class="form-input" placeholder="Musterstraße 1, 80333 München" autocomplete="street-address">
      </div>
      <div class="form-group">
        <label class="form-label">Rolle</label>
        <select id="f-role" class="form-select">
          <option value="mitglied">Mitglied</option>
          <option value="kassenwart">Kassenwart</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <div class="info-box amber">Eine Einladungs-E-Mail wird an die Adresse gesendet. Das Mitglied setzt selbst ein Passwort.</div>
    </div>
    <div class="modal-footer">
      <button class="btn" id="modal-cancel">Abbrechen</button>
      <button class="btn btn-primary" id="modal-save">Einladen & speichern</button>
    </div>
  </div>
</div>

<script type="module">
  import { requireAuth, isAdmin } from '/js/auth-guard.js';
  import { supabase, getCommunityId, writeAuditLog } from '/js/client.js';
  import { renderLayout, showToast, openModal, closeModal, formatDate, initials } from '/js/ui.js';

  const membership = await requireAuth();
  if (!membership) throw new Error('not logged in');
  renderLayout('members');
  const communityId = getCommunityId();
  const now = new Date(); const month = now.getMonth() + 1; const year = now.getFullYear();
  if (!isAdmin()) document.getElementById('add-btn').style.display = 'none';

  let allMembers = [], paidIds = new Set(), prevPaidIds = new Set(), activeTab = 'alle', searchTerm = '';

  async function loadAll() {
    const { data } = await supabase.from('memberships').select('id, joined_at, role, status, profiles(full_name, phone)').eq('community_id', communityId).order('joined_at');
    allMembers = data || [];
    const ids = allMembers.map(m => m.id);
    const { data: p1 } = await supabase.from('payments').select('membership_id').in('membership_id', ids).eq('period_month', month).eq('period_year', year);
    paidIds = new Set(p1?.map(p => p.membership_id));
    const pm = month === 1 ? 12 : month - 1; const py = month === 1 ? year - 1 : year;
    const { data: p2 } = await supabase.from('payments').select('membership_id').in('membership_id', ids).eq('period_month', pm).eq('period_year', py);
    prevPaidIds = new Set(p2?.map(p => p.membership_id));
    allMembers = allMembers.map(m => ({ ...m, paidThis: paidIds.has(m.id), paidPrev: prevPaidIds.has(m.id) }));
    updateCounts(); renderTable();
  }

  function updateCounts() {
    const active = allMembers.filter(m => m.status === 'aktiv');
    document.getElementById('count-alle').textContent       = `(${active.length})`;
    document.getElementById('count-offen').textContent      = `(${active.filter(m => !m.paidThis).length})`;
    document.getElementById('count-ueberfaellig').textContent = `(${active.filter(m => !m.paidThis && !m.paidPrev).length})`;
  }

  function getFiltered() {
    let list = allMembers.filter(m => m.status === 'aktiv');
    if (activeTab === 'offen') list = list.filter(m => !m.paidThis);
    if (activeTab === 'ueberfaellig') list = list.filter(m => !m.paidThis && !m.paidPrev);
    if (searchTerm) { const q = searchTerm.toLowerCase(); list = list.filter(m => m.profiles?.full_name?.toLowerCase().includes(q)); }
    return list;
  }

  function renderTable() {
    const list = getFiltered();
    if (!list.length) { document.getElementById('members-table').innerHTML = '<div class="empty-state">Keine Mitglieder gefunden</div>'; return; }
    document.getElementById('members-table').innerHTML = list.map(m => {
      const name = m.profiles?.full_name || '—';
      const pill = m.paidThis ? '<span class="pill pill-green">Bezahlt</span>' : m.paidPrev ? '<span class="pill pill-amber">Offen</span>' : '<span class="pill pill-red">Überfällig</span>';
      return `<div class="row" style="grid-template-columns:30px 1fr auto ${isAdmin() && !m.paidThis ? '80px' : ''}">
        <div class="avatar ${m.paidThis ? 'av-green' : 'av-gray'}">${initials(name)}</div>
        <div>
          <div class="name-line">${name}</div>
          <div class="sub-line">${m.profiles?.phone || formatDate(m.joined_at)}</div>
        </div>
        ${pill}
        ${isAdmin() && !m.paidThis ? `<button class="btn btn-sm btn-primary" onclick="quickPay('${m.id}','${name}')">Zahlung</button>` : ''}
      </div>`;
    }).join('');
  }

  window.quickPay = async (id, name) => {
    const { data: comm } = await supabase.from('communities').select('monthly_fee').eq('id', communityId).single();
    const { error } = await supabase.from('payments').insert({ membership_id: id, amount: comm?.monthly_fee ?? 5, period_month: month, period_year: year, recorded_by: (await supabase.auth.getUser()).data.user?.id });
    if (!error) { await writeAuditLog(`Zahlung für ${name} — ${month}/${year}`, 'payment', id); showToast(`Zahlung für ${name} eingetragen`); await loadAll(); }
    else showToast('Fehler', 'error');
  };

  document.querySelectorAll('.tab').forEach(tab => tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active'); activeTab = tab.dataset.tab; renderTable();
  }));
  document.getElementById('search').addEventListener('input', e => { searchTerm = e.target.value; renderTable(); });

  document.getElementById('add-btn').addEventListener('click', () => { document.getElementById('f-joined').value = new Date().toISOString().split('T')[0]; openModal('modal-add'); });
  document.getElementById('modal-close').addEventListener('click',  () => closeModal('modal-add'));
  document.getElementById('modal-cancel').addEventListener('click', () => closeModal('modal-add'));

  document.getElementById('modal-save').addEventListener('click', async () => {
    const name = document.getElementById('f-name').value.trim();
    const email = document.getElementById('f-email').value.trim();
    if (!name || !email) return showToast('Name und E-Mail Pflichtfelder', 'error');
    const btn = document.getElementById('modal-save'); btn.disabled = true; btn.textContent = 'Wird gespeichert…';
    const { data: inv, error } = await supabase.auth.admin.inviteUserByEmail(email);
    if (error || !inv?.user?.id) { showToast('Einladung fehlgeschlagen — bitte manuell in Supabase einladen', 'error'); btn.disabled = false; btn.textContent = 'Einladen & speichern'; return; }
    await supabase.from('profiles').upsert({ id: inv.user.id, full_name: name, phone: document.getElementById('f-phone').value.trim(), address: document.getElementById('f-address').value.trim() });
    await supabase.from('memberships').insert({ profile_id: inv.user.id, community_id: communityId, role: document.getElementById('f-role').value, joined_at: document.getElementById('f-joined').value || new Date().toISOString().split('T')[0] });
    await writeAuditLog(`Mitglied hinzugefügt: ${name}`, 'membership', inv.user.id, { email });
    showToast(`${name} eingeladen`); closeModal('modal-add'); btn.disabled = false; btn.textContent = 'Einladen & speichern';
    ['f-name','f-email','f-phone','f-address'].forEach(id => document.getElementById(id).value = '');
    await loadAll();
  });

  await loadAll();
</script>
</body>
</html>
