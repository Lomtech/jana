<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Jana – Dashboard</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="topbar">
      <div class="topbar-title">Dashboard</div>
      <div class="topbar-actions">
        <button class="btn hide-mobile" onclick="window.location.href='/payments.html'">Zahlung eintragen</button>
        <button class="btn btn-primary" onclick="window.location.href='/members.html'">+ Mitglied</button>
      </div>
    </div>

    <div class="content">
      <div id="case-alert"></div>

      <!-- Kassenstand -->
      <div class="balance-banner">
        <div>
          <div class="balance-label">Kassenstand</div>
          <div class="balance-amount" id="balance-amount">…</div>
          <div class="balance-meta" id="balance-meta">wird berechnet</div>
        </div>
        <div class="balance-badges" id="balance-badges"></div>
      </div>

      <!-- Metriken -->
      <div class="metric-grid">
        <div class="metric">
          <div class="metric-label">Beiträge diesen Monat</div>
          <div class="metric-value" id="m-paid">—</div>
          <div class="metric-sub" id="m-paid-sub">wird geladen</div>
        </div>
        <div class="metric">
          <div class="metric-label">Offene Beiträge</div>
          <div class="metric-value" id="m-open">—</div>
          <div class="metric-sub" id="m-open-sub">wird geladen</div>
        </div>
        <div class="metric">
          <div class="metric-label">Auszahlungen gesamt</div>
          <div class="metric-value" id="m-payouts">—</div>
          <div class="metric-sub">seit Gründung</div>
        </div>
      </div>

      <div class="two-col">
        <!-- Mitglieder -->
        <div class="card">
          <div class="card-header">
            <div class="card-title">Mitglieder</div>
            <a class="card-link" href="/members.html">Alle →</a>
          </div>
          <div id="members-list"><div class="empty-state">Wird geladen…</div></div>
        </div>

        <div class="gap-stack">
          <!-- Transaktionen -->
          <div class="card">
            <div class="card-header">
              <div class="card-title">Letzte Buchungen</div>
              <a class="card-link" href="/transactions.html">Alle →</a>
            </div>
            <div id="tx-list"><div class="empty-state">Wird geladen…</div></div>
          </div>

          <!-- Audit -->
          <div class="card">
            <div class="card-header">
              <div class="card-title">Audit-Log</div>
              <a class="card-link" href="/audit.html">Vollständig →</a>
            </div>
            <div id="audit-list"><div class="empty-state">Wird geladen…</div></div>
            <div style="padding:8px 16px;font-size:11px;color:var(--text-faint);border-top:0.5px solid var(--border)">
              Alle Einträge sind unveränderlich.
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { requireAuth } from '/js/auth-guard.js';
  import { supabase, getCommunityId } from '/js/client.js';
  import { renderLayout, formatEur, formatDate, initials, monthLabel } from '/js/ui.js';

  const membership = await requireAuth();
  if (!membership) throw new Error('not logged in');
  renderLayout('dashboard');

  const communityId = getCommunityId();
  const now = new Date();
  const month = now.getMonth() + 1;
  const year  = now.getFullYear();

  async function loadBalance() {
    const { data } = await supabase.from('community_balance').select('*').eq('community_id', communityId).single();
    document.getElementById('balance-amount').textContent = formatEur(data?.balance ?? 0);
    document.getElementById('balance-meta').textContent = `Echtzeit · ${new Date().toLocaleString('de-DE')}`;
  }

  async function loadBadges() {
    const { count } = await supabase.from('memberships').select('*', { count: 'exact', head: true }).eq('community_id', communityId).eq('status', 'aktiv');
    const { data: comm } = await supabase.from('communities').select('monthly_fee').eq('id', communityId).single();
    document.getElementById('balance-badges').innerHTML = `
      <div class="balance-badge">${count ?? 0} Mitglieder</div>
      <div class="balance-badge">${formatEur(comm?.monthly_fee)} / Monat</div>`;
  }

  async function loadMetrics() {
    const { count: total } = await supabase.from('memberships').select('*', { count: 'exact', head: true }).eq('community_id', communityId).eq('status', 'aktiv');
    const { count: paid } = await supabase.from('payments').select('memberships!inner(community_id)', { count: 'exact', head: true }).eq('memberships.community_id', communityId).eq('period_month', month).eq('period_year', year);
    const open = (total ?? 0) - (paid ?? 0);
    const pct  = total ? Math.round(((paid ?? 0) / total) * 100) : 0;
    document.getElementById('m-paid').textContent    = `${paid ?? 0} / ${total ?? 0}`;
    document.getElementById('m-paid-sub').className  = `metric-sub ${pct >= 80 ? 'good' : pct >= 50 ? 'warn' : 'bad'}`;
    document.getElementById('m-paid-sub').textContent = `${pct} % — ${monthLabel(month, year)}`;
    document.getElementById('m-open').textContent    = open;
    document.getElementById('m-open-sub').textContent = open === 0 ? 'Alle bezahlt!' : 'ausstehend';
    document.getElementById('m-open-sub').className  = `metric-sub ${open === 0 ? 'good' : 'warn'}`;
  }

  async function loadPayouts() {
    const { count } = await supabase.from('transactions').select('*', { count: 'exact', head: true }).eq('community_id', communityId).eq('direction', 'ausgang');
    document.getElementById('m-payouts').textContent = count ?? 0;
  }

  async function loadOpenCase() {
    const { data } = await supabase.from('cases').select('*').eq('community_id', communityId).in('status', ['offen','bearbeitung']).order('created_at', { ascending: false }).limit(1);
    const el = document.getElementById('case-alert');
    if (data?.length) {
      const c = data[0];
      el.innerHTML = `<div class="alert alert-warn">
        <div>
          <div class="alert-title">Offener Fall — ${c.deceased_name}</div>
          <div class="alert-sub">Todesdatum: ${formatDate(c.death_date)}</div>
        </div>
        <a class="btn btn-sm" href="/cases.html">Zum Fall →</a>
      </div>`;
    }
  }

  async function loadMembers() {
    const { data } = await supabase.from('memberships').select('id, joined_at, profiles(full_name)').eq('community_id', communityId).eq('status', 'aktiv').order('joined_at', { ascending: false }).limit(5);
    if (!data?.length) { document.getElementById('members-list').innerHTML = '<div class="empty-state">Noch keine Mitglieder</div>'; return; }

    const ids = data.map(m => m.id);
    const { data: payments } = await supabase.from('payments').select('membership_id').in('membership_id', ids).eq('period_month', month).eq('period_year', year);
    const paidIds = new Set(payments?.map(p => p.membership_id));

    document.getElementById('members-list').innerHTML = data.map(m => {
      const paid = paidIds.has(m.id);
      const name = m.profiles?.full_name || '—';
      return `<div class="row" style="grid-template-columns:30px 1fr auto">
        <div class="avatar ${paid ? 'av-green' : 'av-gray'}">${initials(name)}</div>
        <div><div class="name-line">${name}</div><div class="sub-line">${formatDate(m.joined_at)}</div></div>
        <span class="pill ${paid ? 'pill-green' : 'pill-amber'}">${paid ? 'Bezahlt' : 'Offen'}</span>
      </div>`;
    }).join('');
  }

  async function loadTransactions() {
    const { data } = await supabase.from('transactions').select('*, profiles(full_name)').eq('community_id', communityId).order('created_at', { ascending: false }).limit(4);
    if (!data?.length) { document.getElementById('tx-list').innerHTML = '<div class="empty-state">Keine Buchungen</div>'; return; }
    document.getElementById('tx-list').innerHTML = data.map(tx => {
      const isIn = tx.direction === 'eingang';
      return `<div class="row" style="grid-template-columns:30px 1fr auto">
        <div class="avatar" style="background:${isIn ? 'var(--green-light)' : 'var(--red-light)'};color:${isIn ? 'var(--green-dark)' : 'var(--red)'};font-size:14px;font-weight:500">${isIn ? '↓' : '↑'}</div>
        <div><div class="name-line">${tx.description}</div><div class="sub-line">${formatDate(tx.created_at)}</div></div>
        <div class="${isIn ? 'mono-green' : 'mono-red'}">${isIn ? '+' : '−'}${formatEur(tx.amount)}</div>
      </div>`;
    }).join('');
  }

  async function loadAudit() {
    const { data } = await supabase.from('audit_log').select('*, profiles(full_name)').eq('community_id', communityId).order('created_at', { ascending: false }).limit(4);
    if (!data?.length) { document.getElementById('audit-list').innerHTML = '<div class="empty-state">Keine Einträge</div>'; return; }
    document.getElementById('audit-list').innerHTML = data.map(a => {
      const time = new Date(a.created_at).toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
      return `<div class="audit-row"><div class="audit-time">${time}</div><div><span class="audit-actor">${a.profiles?.full_name ?? '—'}</span> · ${a.action}</div></div>`;
    }).join('');
  }

  supabase.channel('dashboard').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'transactions' }, () => { loadBalance(); loadTransactions(); }).on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'payments' }, () => { loadMetrics(); loadMembers(); }).subscribe();

  await Promise.all([loadBalance(), loadBadges(), loadMetrics(), loadPayouts(), loadOpenCase(), loadMembers(), loadTransactions(), loadAudit()]);
</script>
</body>
</html>
