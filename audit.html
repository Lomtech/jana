<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Jana – Audit-Log</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="topbar">
      <div class="topbar-title">Audit-Log</div>
    </div>

    <div class="content">
      <div class="alert alert-green">
        <div>
          <div class="alert-title">Unveränderlicher Log</div>
          <div class="alert-sub">Kein Eintrag kann gelöscht oder editiert werden — von niemandem.</div>
        </div>
      </div>

      <!-- Suche + Filter -->
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <input type="text" id="search" class="form-input" placeholder="Suchen…" style="flex:1;min-width:140px">
        <select id="filter-type" class="form-select" style="width:auto;padding-right:28px">
          <option value="">Alle Typen</option>
          <option value="payment">Zahlungen</option>
          <option value="case">Todesfälle</option>
          <option value="transaction">Transaktionen</option>
          <option value="membership">Mitglieder</option>
        </select>
      </div>

      <div class="card">
        <div style="padding:8px 16px;background:var(--bg-sub);border-bottom:0.5px solid var(--border);font-size:11px;color:var(--text-muted)">
          Einsehbar für alle Mitglieder — Datenschutz: keine Adressen oder Telefonnummern sichtbar.
        </div>
        <div id="audit-table"><div class="empty-state">Wird geladen…</div></div>
        <div id="load-more-wrap" style="padding:14px;text-align:center;display:none">
          <button class="btn" id="load-more">Mehr laden</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { requireAuth } from '/js/auth-guard.js';
  import { supabase, getCommunityId } from '/js/client.js';
  import { renderLayout, formatDate } from '/js/ui.js';

  const membership = await requireAuth();
  if (!membership) throw new Error('not logged in');
  renderLayout('audit');
  const communityId = getCommunityId();
  const PAGE = 30;
  let offset = 0, allRows = [], filterType = '', searchTerm = '';

  const BADGES = {
    payment:     ['Zahlung',     'pill-green'],
    case:        ['Todesfall',   'pill-red'],
    transaction: ['Transaktion', 'pill-amber'],
    membership:  ['Mitglied',    'pill-gray'],
  };

  async function loadMore(reset = false) {
    if (reset) { offset = 0; allRows = []; }
    let q = supabase.from('audit_log').select('*, profiles(full_name)').eq('community_id', communityId).order('created_at', { ascending: false }).range(offset, offset + PAGE - 1);
    if (filterType) q = q.eq('entity_type', filterType);
    const { data } = await q;
    const rows = data || [];
    allRows = reset ? rows : [...allRows, ...rows];
    offset += rows.length;
    document.getElementById('load-more-wrap').style.display = rows.length === PAGE ? 'block' : 'none';
    render();
  }

  function render() {
    const q = searchTerm.toLowerCase();
    const list = q ? allRows.filter(a => a.action?.toLowerCase().includes(q) || a.profiles?.full_name?.toLowerCase().includes(q)) : allRows;
    const el = document.getElementById('audit-table');
    if (!list.length) { el.innerHTML = '<div class="empty-state">Keine Einträge</div>'; return; }

    let currentDay = '', html = '';
    list.forEach(a => {
      const d   = new Date(a.created_at);
      const day = d.toLocaleDateString('de-DE', { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' });
      if (day !== currentDay) {
        currentDay = day;
        html += `<div style="padding:7px 16px 4px;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-faint);background:var(--bg-sub);border-bottom:0.5px solid var(--border)">${day}</div>`;
      }
      const time = d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
      const b = BADGES[a.entity_type];
      const badge = b ? `<span class="pill ${b[1]}" style="font-size:10px;padding:2px 7px;margin-left:6px">${b[0]}</span>` : '';
      html += `<div class="audit-row">
        <div class="audit-time">${time}</div>
        <div style="flex:1;min-width:0">
          <span class="audit-actor">${a.profiles?.full_name ?? 'System'}</span>${badge}<br>
          <span style="color:var(--text-muted)">${a.action}</span>
        </div>
        <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text-faint);white-space:nowrap;padding-left:8px">#${a.id}</div>
      </div>`;
    });
    el.innerHTML = html;
  }

  document.getElementById('filter-type').addEventListener('change', async e => { filterType = e.target.value; await loadMore(true); });
  document.getElementById('search').addEventListener('input', e => { searchTerm = e.target.value; render(); });
  document.getElementById('load-more').addEventListener('click', () => loadMore());

  supabase.channel('audit').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'audit_log', filter: `community_id=eq.${communityId}` }, p => { allRows.unshift(p.new); render(); }).subscribe();

  await loadMore(true);
</script>
</body>
</html>
