<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jana – Audit-Log</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>

  <div class="main">
    <div class="topbar">
      <div class="topbar-title">Audit-Log</div>
    </div>

    <div class="content">
      <!-- Trust Banner -->
      <div class="alert alert-green">
        <div>
          <div class="alert-title" style="color:var(--green-dark)">Dieser Log ist unveränderlich</div>
          <div class="alert-sub">Kein Eintrag kann gelöscht, editiert oder rückwirkend geändert werden — von niemandem, auch nicht vom Admin.</div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">Alle Aktionen</div>
          <div style="display:flex; gap:8px; align-items:center">
            <input type="text" id="search" class="form-input" placeholder="Suchen…" style="width:180px; font-size:12px; padding:5px 10px">
            <select id="filter-type" class="form-select" style="font-size:12px; padding:6px 10px; width:auto">
              <option value="">Alle Typen</option>
              <option value="payment">Zahlungen</option>
              <option value="case">Todesfälle</option>
              <option value="transaction">Transaktionen</option>
              <option value="membership">Mitglieder</option>
            </select>
          </div>
        </div>

        <!-- Info für Mitglieder -->
        <div style="padding:10px 18px; background:var(--bg-sub); border-bottom:0.5px solid var(--border); font-size:12px; color:var(--text-muted)">
          Dieser Log ist für alle Mitglieder einsehbar — aus Datenschutzgründen werden keine Adressen oder Telefonnummern angezeigt.
        </div>

        <div id="audit-table">
          <div class="empty-state">Wird geladen…</div>
        </div>

        <div id="load-more-wrap" style="padding:14px; text-align:center; display:none">
          <button class="btn" id="load-more">Mehr laden</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { requireAuth } from '/js/auth-guard.js';
  import { supabase, getCommunityId } from '/js/client.js';
  import { renderLayout, formatDate } from '/js/ui.js';

  const membership = await requireAuth();
  if (!membership) throw new Error('not logged in');
  renderLayout('audit');

  const communityId = getCommunityId();
  const PAGE_SIZE = 30;
  let offset = 0;
  let allRows = [];
  let filterType = '';
  let searchTerm = '';

  async function loadMore(reset = false) {
    if (reset) { offset = 0; allRows = []; }

    let query = supabase
      .from('audit_log')
      .select('*, profiles(full_name)')
      .eq('community_id', communityId)
      .order('created_at', { ascending: false })
      .range(offset, offset + PAGE_SIZE - 1);

    if (filterType) query = query.eq('entity_type', filterType);

    const { data } = await query;
    const rows = data || [];
    allRows = reset ? rows : [...allRows, ...rows];
    offset += rows.length;

    document.getElementById('load-more-wrap').style.display = rows.length === PAGE_SIZE ? 'block' : 'none';
    renderTable();
  }

  function getFiltered() {
    if (!searchTerm) return allRows;
    const q = searchTerm.toLowerCase();
    return allRows.filter(a =>
      a.action?.toLowerCase().includes(q) ||
      a.profiles?.full_name?.toLowerCase().includes(q)
    );
  }

  function renderTable() {
    const list = getFiltered();
    const el   = document.getElementById('audit-table');

    if (!list.length) {
      el.innerHTML = '<div class="empty-state">Keine Einträge gefunden</div>';
      return;
    }

    // Nach Tagen gruppieren
    let currentDay = '';
    let html = '';

    list.forEach(a => {
      const d = new Date(a.created_at);
      const day = d.toLocaleDateString('de-DE', { weekday:'long', day:'2-digit', month:'long', year:'numeric' });
      if (day !== currentDay) {
        currentDay = day;
        html += `
          <div style="padding: 8px 18px 4px; font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-faint); background:var(--bg-sub); border-bottom:0.5px solid var(--border)">
            ${day}
          </div>`;
      }

      const time   = d.toLocaleTimeString('de-DE', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
      const actor  = a.profiles?.full_name || 'System';
      const typeBadge = getTypeBadge(a.entity_type);

      html += `
        <div class="audit-row">
          <div class="audit-time">${time}</div>
          <div style="flex:1">
            <span class="audit-actor">${actor}</span>
            <span style="color:var(--text-muted)"> · </span>
            ${a.action}
            ${typeBadge}
          </div>
          <div style="font-family: 'DM Mono', monospace; font-size:10px; color:var(--text-faint); white-space:nowrap; margin-top:1px">
            ID: ${a.id}
          </div>
        </div>`;
    });

    el.innerHTML = html;
  }

  function getTypeBadge(type) {
    const map = {
      payment:     ['Zahlung',     'pill-green'],
      case:        ['Todesfall',   'pill-red'],
      transaction: ['Transaktion', 'pill-amber'],
      membership:  ['Mitglied',    'pill-gray'],
    };
    if (!type || !map[type]) return '';
    const [label, cls] = map[type];
    return `<span class="pill ${cls}" style="margin-left:8px; font-size:10px; padding:2px 7px">${label}</span>`;
  }

  // Filter
  document.getElementById('filter-type').addEventListener('change', async e => {
    filterType = e.target.value;
    await loadMore(true);
  });

  // Suche (nur in bereits geladenen)
  document.getElementById('search').addEventListener('input', e => {
    searchTerm = e.target.value;
    renderTable();
  });

  // Load more
  document.getElementById('load-more').addEventListener('click', () => loadMore());

  // Realtime: neuer Audit-Eintrag
  supabase.channel('audit-realtime')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'audit_log',
        filter: `community_id=eq.${communityId}` },
      (payload) => {
        // Oben prependen ohne neu zu laden
        allRows.unshift(payload.new);
        renderTable();
      }
    )
    .subscribe();

  await loadMore(true);
</script>
</body>
</html>
