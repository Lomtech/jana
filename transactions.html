<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Jana – Transaktionen</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="topbar">
      <div class="topbar-title">Kassenbuch</div>
      <div class="topbar-actions">
        <select id="filter-dir" class="form-select" style="font-size:13px;padding:6px 28px 6px 10px;width:auto">
          <option value="">Alle</option>
          <option value="eingang">Eingänge</option>
          <option value="ausgang">Ausgänge</option>
        </select>
        <button class="btn btn-primary" id="manual-btn">+ Eintrag</button>
      </div>
    </div>

    <div class="content">
      <div class="balance-banner">
        <div>
          <div class="balance-label">Kassenstand</div>
          <div class="balance-amount" id="balance">…</div>
          <div class="balance-meta">Live berechnet — unveränderlich</div>
        </div>
        <div class="balance-badges">
          <div class="balance-badge" id="b-in">↓ Eingänge: —</div>
          <div class="balance-badge" id="b-out">↑ Ausgänge: —</div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">Kassenbuch</div>
          <div class="text-small text-muted">Einträge sind unveränderlich</div>
        </div>
        <div id="tx-table"><div class="empty-state">Wird geladen…</div></div>
      </div>
    </div>
  </div>
</div>

<!-- Modal: Manuelle Buchung -->
<div class="modal-overlay hidden" id="modal-manual">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title">Manuelle Buchung</div>
      <button class="modal-close" id="mm-close">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Richtung *</label>
        <select id="mm-dir" class="form-select">
          <option value="eingang">Eingang (+ zur Kasse)</option>
          <option value="ausgang">Ausgang (− aus Kasse)</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Betrag (€) *</label>
        <input type="number" id="mm-amount" class="form-input" inputmode="decimal" step="0.01" placeholder="0.00">
      </div>
      <div class="form-group">
        <label class="form-label">Beschreibung *</label>
        <input type="text" id="mm-desc" class="form-input" placeholder="z. B. Sonderzahlung">
      </div>
      <div class="info-box amber">Manuelle Buchungen können nicht gelöscht werden. Bei Fehler bitte Gegenbuchung anlegen.</div>
    </div>
    <div class="modal-footer">
      <button class="btn" id="mm-cancel">Abbrechen</button>
      <button class="btn btn-primary" id="mm-save">Buchen</button>
    </div>
  </div>
</div>

<script type="module">
  import { requireAuth, isAdmin } from '/js/auth-guard.js';
  import { supabase, getCommunityId, writeAuditLog } from '/js/client.js';
  import { renderLayout, showToast, openModal, closeModal, formatEur, formatDate } from '/js/ui.js';

  const membership = await requireAuth();
  if (!membership) throw new Error('not logged in');
  renderLayout('transactions');
  const communityId = getCommunityId();
  if (!isAdmin()) document.getElementById('manual-btn').style.display = 'none';
  let filterDir = '';

  async function load() {
    const { data: bal } = await supabase.from('community_balance').select('*').eq('community_id', communityId).single();
    document.getElementById('balance').textContent = formatEur(bal?.balance ?? 0);
    document.getElementById('b-in').textContent    = `↓ ${formatEur(bal?.total_in ?? 0)}`;
    document.getElementById('b-out').textContent   = `↑ ${formatEur(bal?.total_out ?? 0)}`;

    let q = supabase.from('transactions').select('*, profiles(full_name)').eq('community_id', communityId).order('created_at', { ascending: false });
    if (filterDir) q = q.eq('direction', filterDir);
    const { data: txs } = await q;

    if (!txs?.length) { document.getElementById('tx-table').innerHTML = '<div class="empty-state">Keine Transaktionen</div>'; return; }
    document.getElementById('tx-table').innerHTML = txs.map(tx => {
      const isIn = tx.direction === 'eingang';
      return `<div class="row" style="grid-template-columns:30px 1fr auto">
        <div class="avatar" style="background:${isIn ? 'var(--green-light)' : 'var(--red-light)'};color:${isIn ? 'var(--green-dark)' : 'var(--red)'};font-size:15px;font-weight:500">${isIn ? '↓' : '↑'}</div>
        <div>
          <div class="name-line">${tx.description}</div>
          <div class="sub-line">${formatDate(tx.created_at)} · ${tx.profiles?.full_name || '—'}</div>
        </div>
        <div class="${isIn ? 'mono-green' : 'mono-red'}">${isIn ? '+' : '−'}${formatEur(tx.amount)}</div>
      </div>`;
    }).join('');
  }

  document.getElementById('filter-dir').addEventListener('change', e => { filterDir = e.target.value; load(); });
  document.getElementById('manual-btn').addEventListener('click', () => openModal('modal-manual'));
  document.getElementById('mm-close').addEventListener('click',  () => closeModal('modal-manual'));
  document.getElementById('mm-cancel').addEventListener('click', () => closeModal('modal-manual'));
  document.getElementById('mm-save').addEventListener('click', async () => {
    const dir = document.getElementById('mm-dir').value;
    const amount = parseFloat(document.getElementById('mm-amount').value);
    const desc   = document.getElementById('mm-desc').value.trim();
    if (!amount || !desc) return showToast('Alle Felder ausfüllen', 'error');
    const btn = document.getElementById('mm-save'); btn.disabled = true;
    const user = (await supabase.auth.getUser()).data.user;
    await supabase.from('transactions').insert({ community_id: communityId, amount, direction: dir, description: desc, recorded_by: user?.id });
    await writeAuditLog(`Manuelle Buchung: ${dir === 'eingang' ? '+' : '−'}${formatEur(amount)} — ${desc}`, 'transaction', null);
    showToast('Buchung gespeichert'); closeModal('modal-manual'); btn.disabled = false; await load();
  });

  supabase.channel('tx').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'transactions' }, load).subscribe();
  await load();
</script>
</body>
</html>
